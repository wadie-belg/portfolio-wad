
<!DOCTYPE html>
<html>
<head>
<style>
body { font-family: monospace; padding: 20px; background: #111; color: #0f0; }
.table { border-collapse: collapse; width: 100%; }
.table td, .table th { border: 1px solid #333; padding: 5px; }
</style>
</head>
<body>
<h2>Portfolio Debug Helper</h2>
<div id="results"></div>
<script>
async function check() {
    const results = [];
    
    // Check hero content
    const heroContent = document.querySelector('.hero-content');
    if (heroContent) {
        const s = window.getComputedStyle(heroContent);
        results.push('=== HERO-CONTENT ===');
        results.push('opacity: ' + s.opacity);
        results.push('display: ' + s.display);
        results.push('visibility: ' + s.visibility);
        results.push('height: ' + s.height);
        results.push('width: ' + s.width);
        results.push('top: ' + s.top);
    } else {
        results.push('hero-content NOT FOUND');
    }
    
    // Check h1
    const h1 = document.querySelector('h1');
    if (h1) {
        const s = window.getComputedStyle(h1);
        results.push('=== H1 ===');
        results.push('text: ' + h1.textContent);
        results.push('opacity: ' + s.opacity);
        results.push('display: ' + s.display);
        results.push('background-color: ' + s.backgroundColor);
        results.push('color: ' + s.color);
        results.push('-webkit-text-fill-color: ' + s.webkitTextFillColor);
        results.push('font-size: ' + s.fontSize);
        results.push('background-clip: ' + s.backgroundClip);
    }
    
    // Check section titles
    const titles = document.querySelectorAll('.section-title');
    results.push('=== SECTION TITLES (' + titles.length + ') ===');
    titles.forEach((t, i) => {
        const s = window.getComputedStyle(t);
        results.push('[' + i + '] ' + t.textContent.substring(0,20) + ': opacity=' + s.opacity + ' display=' + s.display);
    });
    
    // Check about text
    const about = document.getElementById('about-text');
    if (about) {
        const s = window.getComputedStyle(about);
        results.push('=== ABOUT TEXT ===');
        results.push('text: ' + about.textContent.substring(0,50));
        results.push('opacity: ' + s.opacity);
        results.push('display: ' + s.display);
        results.push('color: ' + s.color);
    }
    
    // Check all cards
    const cards = document.querySelectorAll('.content-card');
    results.push('=== CARDS (' + cards.length + ') ===');
    if (cards.length > 0) {
        const s = window.getComputedStyle(cards[0]);
        results.push('first card: opacity=' + s.opacity + ' bg=' + s.backgroundColor + ' display=' + s.display);
    }
    
    // Check body
    results.push('=== BODY ===');
    const bs = window.getComputedStyle(document.body);
    results.push('bg: ' + bs.backgroundColor);
    results.push('color: ' + bs.color);
    results.push('font-family: ' + bs.fontFamily);
    
    // Check HTML
    results.push('=== HTML ===');
    const hs = window.getComputedStyle(document.documentElement);
    results.push('bg: ' + hs.backgroundColor);
    results.push('color: ' + hs.color);
    
    // Check if there's a full-page overlay
    const overlays = document.querySelectorAll('[style*="opacity"], [style*="background"], #particles-js, #canvas-container');
    results.push('=== OVERLAYS ===');
    results.push('particles-div exists: ' + (document.getElementById('particles-js') !== null));
    const pd = document.getElementById('particles-js');
    if (pd) {
        const ps = window.getComputedStyle(pd);
        results.push('particles-div opacity: ' + ps.opacity);
        results.push('particles-div bg: ' + ps.backgroundColor);
        results.push('particles-div bgImage: ' + ps.backgroundImage);
        results.push('particles-div display: ' + ps.display);
        results.push('particles-div pos: ' + ps.position);
    }
    
    // Check home section (hero)
    const home = document.getElementById('home');
    if (home) {
        const hs = window.getComputedStyle(home);
        results.push('=== #home (HERO) ===');
        results.push('opacity: ' + hs.opacity);
        results.push('bg: ' + hs.backgroundColor);
        results.push('bgImage: ' + hs.backgroundImage.substring(0,100));
        results.push('::before overlay opacity: ' + window.getComputedStyle(home, ':before').opacity);
    }
    
    // GSAP check
    results.push('=== GSAP ===');
    results.push('type: ' + typeof gsap);
    results.push('ScrollTrigger: ' + typeof ScrollTrigger);
    
    document.getElementById('results').innerHTML = '<table class="table">' + results.map(r => r.includes('===') ? '<tr><th colspan="2">' + r + '</th></tr>' : '<tr><td>' + r.split(':')[0] + '</td><td>' + r.split(':').slice(1).join(':') + '</td></tr>').join('') + '</table>';
}
check();
</script>
</body>
</html>
